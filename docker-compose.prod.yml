# PRODUCTION Docker Compose - Single Network Configuration
# All services on restpoint_network (NO mortuary-network, NO restpoint_net)
# All container names use service names without _1 suffix
# All internal services run on port 5000
# All services have health checks and proper dependencies

services:
  # =============================================================================
  # INFRASTRUCTURE SERVICES
  # =============================================================================
  
  mariadb:
    image: mariadb:10.11
    container_name: restpoint_mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${MARIADB_EXTERNAL_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - restpoint_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: restpoint_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - restpoint_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: restpoint_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_EXTERNAL_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - restpoint_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5

  # =============================================================================
  # API GATEWAY
  # =============================================================================
  
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    image: restpoint-api-gateway:latest
    container_name: restpoint_api_gateway
    restart: always
    ports:
      - "${API_GATEWAY_EXTERNAL_PORT:-5000}:5000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 5000
      # Service URLs - use service names (no _1 suffix) since all on same network
      AUTH_SERVICE_URL: http://auth-service:5000
      TENANT_SERVICE_URL: http://tenant-service:5000
      DECEASED_SERVICE_URL: http://deceased-service:5000
      MARKETPLACE_SERVICE_URL: http://marketplace-service:5000
      MPESA_SERVICE_URL: http://mpesa-service:5000
      PORTAL_SERVICE_URL: http://portal-service:5000
      INVOICES_SERVICE_URL: http://invoice-service:5000
      COFFIN_SERVICE_URL: http://coffin-service:5000
      VISITORS_SERVICE_URL: http://visitors-service:5000
      NOTIFICATION_SERVICE_URL: http://notification-service:5000
      DOCUMENTS_SERVICE_URL: http://documents-service:5000
      ANALYTICS_SERVICE_URL: http://analytics-service:5000
      BODYCHECKOUT_SERVICE_URL: http://bodycheckout-service:5000
      EDOCUMENTS_SERVICE_URL: http://edocuments-service:5000
      CALENDAR_SERVICE_URL: http://calender-service:5000
      CHEMICALS_SERVICE_URL: http://chemical-service:5000
      BILLING_SERVICE_URL: http://billing-service:5000
      SOCKETIO_SERVICE_URL: http://socketio-service:5000
      EXTRA_SERVICES_URL: http://extra-services:5000
      CALL_SERVICE_URL: http://call-service:5000
      QRCODE_SERVICE_URL: http://qrcode-service:5000
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - restpoint_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

