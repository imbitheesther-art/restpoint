# =============================================================================
# NETWORK DEFINITION - ONLY ONE NETWORK
# =============================================================================
networks:
  restpoint_network:
    driver: bridge
    name: restpoint_network
    attachable: true

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
