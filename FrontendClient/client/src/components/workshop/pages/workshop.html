<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MORTEM — Coffin Production Workshop</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,900;1,9..40,400&family=Playfair+Display:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --bg-deep: #07090f;
        --bg-main: #0c1018;
        --bg-card: #131a26;
        --bg-card-h: #1a2233;
        --bdr: rgba(212, 160, 83, 0.12);
        --bdr-s: rgba(212, 160, 83, 0.25);
        --accent: #d4a053;
        --accent-l: #f0c97a;
        --accent-d: rgba(212, 160, 83, 0.15);
        --ok: #10b981;
        --err: #ef4444;
        --warn: #f59e0b;
        --info: #3b82f6;
        --t1: #f5f0eb;
        --t2: #9ca3af;
        --t3: #4b5563;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg-deep);
        color: var(--t1);
        overflow-x: hidden;
        min-height: 100vh;
      }
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-main);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(212, 160, 83, 0.2);
        border-radius: 3px;
      }

      @keyframes pulseRing {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(212, 160, 83, 0.4);
        }
        50% {
          box-shadow: 0 0 0 8px rgba(212, 160, 83, 0);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(100px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes slideOut {
        from {
          opacity: 1;
          transform: translateX(0);
        }
        to {
          opacity: 0;
          transform: translateX(100px);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes fadeOut {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }
      @keyframes modalIn {
        from {
          opacity: 0;
          transform: scale(0.95) translateY(10px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      @keyframes modalOut {
        from {
          opacity: 1;
          transform: scale(1);
        }
        to {
          opacity: 0;
          transform: scale(0.95);
        }
      }
      @keyframes miniPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      @keyframes livePulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .bg-atmos {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 800px 600px at 15% 20%,
            rgba(212, 160, 83, 0.04) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 600px 500px at 85% 80%,
            rgba(16, 185, 129, 0.03) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 400px 400px at 50% 50%,
            rgba(212, 160, 83, 0.02) 0%,
            transparent 70%
          );
      }

      /* Sidebar */
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: 260px;
        background: linear-gradient(180deg, #0d1220, #0a0e17);
        border-right: 1px solid var(--bdr);
        z-index: 50;
        display: flex;
        flex-direction: column;
        transition: transform 0.3s;
      }
      .sidebar-logo {
        padding: 1.5rem 1.25rem;
        border-bottom: 1px solid var(--bdr);
      }
      .sidebar-logo h1 {
        font-family: 'Playfair Display', serif;
        font-size: 1.6rem;
        font-weight: 900;
        color: var(--accent);
        letter-spacing: 0.15em;
      }
      .sidebar-logo span {
        font-size: 0.65rem;
        color: var(--t3);
        letter-spacing: 0.25em;
        text-transform: uppercase;
        display: block;
        margin-top: 0.25rem;
      }
      .nav-sec {
        padding: 1rem 0.75rem;
        flex: 1;
        overflow-y: auto;
      }
      .nav-lbl {
        font-size: 0.6rem;
        color: var(--t3);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 0.5rem 0.75rem;
        margin-top: 0.5rem;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.7rem 0.75rem;
        border-radius: 10px;
        color: var(--t2);
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 2px;
        position: relative;
      }
      .nav-item:hover {
        background: rgba(212, 160, 83, 0.08);
        color: var(--t1);
      }
      .nav-item.active {
        background: linear-gradient(135deg, rgba(212, 160, 83, 0.2), rgba(212, 160, 83, 0.08));
        color: var(--accent);
        font-weight: 600;
      }
      .nav-item.active::before {
        content: '';
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 3px;
        height: 60%;
        background: var(--accent);
        border-radius: 0 3px 3px 0;
      }
      .nav-item i {
        width: 20px;
        text-align: center;
        font-size: 0.9rem;
      }
      .nav-badge {
        margin-left: auto;
        color: #fff;
        font-size: 0.65rem;
        font-weight: 700;
        padding: 0.15rem 0.45rem;
        border-radius: 99px;
        min-width: 20px;
        text-align: center;
      }
      .nav-badge.gold {
        background: var(--accent);
      }
      .nav-badge.red {
        background: var(--err);
      }
      .sidebar-foot {
        padding: 1rem 0.75rem;
        border-top: 1px solid var(--bdr);
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      /* Main */
      .main {
        margin-left: 260px;
        min-height: 100vh;
        position: relative;
        z-index: 1;
      }

      /* Top bar */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 40;
        background: rgba(7, 9, 15, 0.85);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--bdr);
        padding: 0.75rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .search-box {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--bg-card);
        border: 1px solid var(--bdr);
        border-radius: 10px;
        padding: 0.5rem 1rem;
        width: 320px;
        transition: border-color 0.2s;
      }
      .search-box:focus-within {
        border-color: var(--accent);
      }
      .search-box input {
        background: none;
        border: none;
        outline: none;
        color: var(--t1);
        font-size: 0.85rem;
        width: 100%;
        font-family: 'DM Sans', sans-serif;
      }
      .search-box input::placeholder {
        color: var(--t3);
      }
      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .top-btn {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: var(--bg-card);
        border: 1px solid var(--bdr);
        color: var(--t2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        position: relative;
      }
      .top-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .top-btn .dot {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--err);
        border: 2px solid var(--bg-deep);
      }
      .live-badge {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.75rem;
        border-radius: 99px;
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.2);
      }
      .live-badge .ld {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--ok);
        animation: livePulse 2s infinite;
      }
      .live-badge span {
        font-size: 0.72rem;
        color: var(--ok);
        font-weight: 600;
      }
      .user-av {
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), #b8860b);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
        flex-shrink: 0;
      }

      /* Page */
      .page {
        padding: 1.5rem 2rem 3rem;
      }
      .page-hdr {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .page-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.8rem;
        font-weight: 900;
      }
      .page-sub {
        color: var(--t3);
        font-size: 0.85rem;
        margin-top: 0.25rem;
      }

      /* Stat grid */
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--bdr);
        border-radius: 14px;
        padding: 1.25rem;
        position: relative;
        overflow: hidden;
        transition: all 0.3s;
      }
      .stat-card:hover {
        border-color: var(--bdr-s);
        transform: translateY(-2px);
      }
      .stat-card .glow {
        position: absolute;
        top: -20px;
        right: -20px;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        filter: blur(30px);
        opacity: 0.15;
      }
      .stat-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        margin-bottom: 0.75rem;
      }
      .stat-val {
        font-size: 1.75rem;
        font-weight: 900;
        line-height: 1;
        margin-bottom: 0.25rem;
      }
      .stat-lbl {
        font-size: 0.75rem;
        color: var(--t3);
      }
      .stat-chg {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        font-size: 0.7rem;
        font-weight: 600;
        margin-top: 0.5rem;
        padding: 0.15rem 0.5rem;
        border-radius: 99px;
      }

      /* Cards */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--bdr);
        border-radius: 14px;
        overflow: hidden;
      }
      .card-hdr {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--bdr);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .card-ttl {
        font-size: 0.9rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .card-body {
        padding: 1.25rem;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 1.1rem;
        border-radius: 10px;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
        font-family: 'DM Sans', sans-serif;
        background: linear-gradient(135deg, var(--accent), #b8860b);
        color: #fff;
      }
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(212, 160, 83, 0.3);
      }
      .btn-g {
        background: transparent;
        color: var(--t2);
        border: 1px solid var(--bdr);
      }
      .btn-g:hover {
        border-color: var(--accent);
        color: var(--accent);
        box-shadow: none;
        transform: none;
      }
      .btn-sm {
        padding: 0.4rem 0.75rem;
        font-size: 0.75rem;
        border-radius: 8px;
      }
      .btn-danger {
        color: var(--err);
        border-color: rgba(239, 68, 68, 0.3);
      }
      .btn-danger:hover {
        border-color: var(--err);
        color: var(--err);
        box-shadow: none;
        transform: none;
      }
      .ibtn {
        width: 32px;
        height: 32px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: var(--bg-card);
        border: 1px solid var(--bdr);
        color: var(--t2);
        cursor: pointer;
        transition: all 0.2s;
      }
      .ibtn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .ibtn-lg {
        width: 38px;
        height: 38px;
      }

      /* Badges */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.2rem 0.6rem;
        border-radius: 99px;
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .badge-green {
        background: rgba(16, 185, 129, 0.15);
        color: #34d399;
      }
      .badge-red {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
      }
      .badge-amber {
        background: rgba(245, 158, 11, 0.15);
        color: #fbbf24;
      }
      .badge-blue {
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
      }
      .badge-gray {
        background: rgba(107, 114, 128, 0.15);
        color: #9ca3af;
      }
      .badge-purple {
        background: rgba(168, 85, 247, 0.15);
        color: #c084fc;
      }

      /* Pipeline */
      .pipeline {
        display: flex;
        gap: 0;
        overflow-x: auto;
        padding: 4px 1.25rem 1.25rem;
      }
      .pipe-stage {
        flex: 1;
        min-width: 100px;
        text-align: center;
        position: relative;
      }
      .pipe-stage:not(:last-child)::after {
        content: '';
        position: absolute;
        top: 20px;
        left: calc(50% + 20px);
        right: calc(-50% + 20px);
        height: 2px;
        background: var(--bdr);
        transition: background 0.3s;
      }
      .pipe-stage.done:not(:last-child)::after {
        background: var(--ok);
      }
      .pipe-stage.active:not(:last-child)::after {
        background: linear-gradient(90deg, var(--accent), var(--bdr));
      }
      .pipe-dot {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        margin: 0 auto 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        border: 2px solid var(--bdr);
        background: var(--bg-card);
        color: var(--t3);
        transition: all 0.3s;
        position: relative;
        z-index: 2;
      }
      .pipe-stage.done .pipe-dot {
        background: var(--ok);
        border-color: var(--ok);
        color: #fff;
      }
      .pipe-stage.active .pipe-dot {
        border-color: var(--accent);
        color: var(--accent);
        animation: pulseRing 2s ease-in-out infinite;
      }
      .pipe-lbl {
        font-size: 0.65rem;
        color: var(--t3);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: color 0.3s;
      }
      .pipe-stage.active .pipe-lbl {
        color: var(--accent);
      }
      .pipe-stage.done .pipe-lbl {
        color: var(--ok);
      }
      .pipe-cnt {
        font-size: 0.7rem;
        color: var(--t2);
        margin-top: 0.15rem;
      }

      /* Table */
      .dt {
        width: 100%;
        border-collapse: collapse;
      }
      .dt th {
        text-align: left;
        padding: 0.65rem 1rem;
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--t3);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border-bottom: 1px solid var(--bdr);
      }
      .dt tr.tr {
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        transition: background 0.15s;
        cursor: pointer;
      }
      .dt tr.tr:hover {
        background: var(--bg-card-h);
      }
      .dt td {
        padding: 0.75rem 1rem;
        font-size: 0.82rem;
        color: var(--t2);
      }

      /* Progress */
      .pbar {
        height: 6px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 3px;
        overflow: hidden;
      }
      .pfill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.6s ease;
      }

      /* Tabs */
      .tab-bar {
        display: flex;
        gap: 0.25rem;
      }
      .tab-btn {
        padding: 0.4rem 0.85rem;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: var(--t3);
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: 'DM Sans', sans-serif;
      }
      .tab-btn:hover {
        color: var(--t2);
      }
      .tab-btn.active {
        background: var(--accent-d);
        color: var(--accent);
      }

      /* Activity */
      .feed-item {
        display: flex;
        gap: 0.75rem;
        padding: 0.65rem 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      }
      .feed-item:last-child {
        border-bottom: none;
      }
      .feed-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-top: 0.35rem;
        flex-shrink: 0;
      }
      .feed-text {
        font-size: 0.78rem;
        color: var(--t2);
        line-height: 1.45;
      }
      .feed-text strong {
        color: var(--t1);
        font-weight: 600;
      }
      .feed-time {
        font-size: 0.65rem;
        color: var(--t3);
        margin-top: 0.15rem;
      }

      /* Order cards */
      .order-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 1rem;
      }
      .order-card {
        background: var(--bg-card);
        border: 1px solid var(--bdr);
        border-radius: 14px;
        padding: 1.15rem;
        transition: all 0.25s;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }
      .order-card:hover {
        border-color: var(--bdr-s);
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      }
      .order-card.urgent {
        border-left: 3px solid var(--err);
      }
      .order-card.high {
        border-left: 3px solid var(--warn);
      }
      .pri-tag {
        position: absolute;
        top: 0;
        right: 0;
        padding: 0.2rem 0.7rem;
        border-radius: 0 14px 0 10px;
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .mini-pipe {
        display: flex;
        gap: 3px;
        margin-top: 0.75rem;
      }
      .mini-d {
        flex: 1;
        height: 4px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.06);
        transition: background 0.3s;
      }
      .mini-d.done {
        background: var(--ok);
      }
      .mini-d.active {
        background: var(--accent);
        animation: miniPulse 1.5s ease-in-out infinite;
      }

      /* Leaderboard */
      .lb-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: 10px;
        transition: background 0.15s;
        margin-bottom: 0.25rem;
      }
      .lb-item:hover {
        background: var(--bg-card-h);
      }
      .lb-rank {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 700;
        flex-shrink: 0;
      }
      .lb-av {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.8rem;
        color: #fff;
        flex-shrink: 0;
      }
      .lb-info {
        flex: 1;
        min-width: 0;
      }
      .lb-name {
        font-size: 0.82rem;
        font-weight: 600;
        display: flex;
        align-items: center;

        const cr = useRef(null);
        useEffect(() => {
          if (!ref.current) return;
          if (cr.current) cr.current.destroy();
          Chart.defaults.color = '#6b7280';
          Chart.defaults.borderColor = 'rgba(255,255,255,0.05)';
          Chart.defaults.font.family = "'DM Sans',sans-serif";
          Chart.defaults.font.size = 11;
          cr.current = new Chart(ref.current, fn());
          return () => {
            if (cr.current) cr.current.destroy();
          };
        }, deps);
      }

      /* Pipeline */
      function Pipeline({ orders }) {
        const counts = useMemo(() => {
          const c = {};
          STAGES.forEach((s) => (c[s.id] = 0));
          orders
            .filter((o) => o.currentStage !== 'completed')
            .forEach((o) => (c[o.currentStage] = (c[o.currentStage] || 0) + 1));
          return c;
        }, [orders]);
        return (
          <div className="pipeline">
            {STAGES.map((s) => {
              const cnt = counts[s.id] || 0;
              const isActive = cnt > 0;
              const doneIdx = STAGES.findIndex((st) => counts[st.id] > 0);
              const myIdx = STAGES.findIndex((st) => st.id === s.id);
              const isDone = myIdx < doneIdx;
              return (
                <div
                  key={s.id}
                  className={
                    'pipe-stage' +
                    (isDone && !isActive ? ' done' : '') +
                    (isActive ? ' active' : '')
                  }
                >
                  <div className="pipe-dot">
                    <i className={'fas ' + s.icon} />
                  </div>
                  <div className="pipe-lbl">{s.label}</div>
                  <div className="pipe-cnt">{cnt} active</div>
                </div>
              );
            })}
          </div>
        );
      }

      /* ═══════ APP ═══════ */
      function App() {
        const [tab, setTab] = useState('dashboard');
        const [sbOpen, setSbOpen] = useState(false);
        const [modal, setModal] = useState({ type: null, data: null });
        const [toasts, setToasts] = useState([]);
        const [orders, setOrders] = useState(() => makeOrders());
        const [materials, setMaterials] = useState(() => makeMaterials());
        const [workers, setWorkers] = useState(() => WORKERS.map((w) => ({ ...w })));
        const [activity, setActivity] = useState(() => makeActivity(makeOrders()));

        const tid = useRef(0);
        const addToast = useCallback((type, title, msg) => {
          const id = ++tid.current;
          setToasts((p) => [...p, { id, type, title, msg, out: false }]);
          setTimeout(
            () => setToasts((p) => p.map((t) => (t.id === id ? { ...t, out: true } : t))),
            3800,
          );
          setTimeout(() => setToasts((p) => p.filter((t) => t.id !== id)), 4100);
        }, []);

        const openModal = useCallback((type, data = null) => setModal({ type, data }), []);
        const closeModal = useCallback(() => setModal({ type: null, data: null }), []);

        const createOrder = useCallback(
          (cust, dec, type, pri, col, int, due) => {
            const w = workers[Math.floor(Math.random() * workers.length)];
            const o = {
              id: gid(),
              orderNumber: 'CF-' + _id,
              customerName: cust,
              deceasedName: dec,
              coffinType: type,
              color: col || 'Walnut',
              interior: int || 'Satin Gold',
              currentStage: 'cutting',
              stages: [
                { ...STAGES[0], status: 'in_progress', startedAt: new Date(), completedAt: null },
              ],
              assignedWorker: { ...w },
              priority: pri || 'normal',
              price: PRICES[type] || 20000,
              createdAt: new Date(),
              dueDate: due
                ? new Date(due)
                : new Date(Date.now() + (3 + Math.floor(Math.random() * 5)) * 86400000),
            };
            setOrders((p) => [o, ...p]);
            setActivity((a) => [
              {
                worker: w,
                action: 'started new order',
                coffin: o,
                time: new Date(),
                type: 'success',
              },
              ...a,
            ]);
            addToast(
              'success',
              'New Order',
              o.orderNumber + ' — ' + o.coffinType + ' coffin for ' + o.deceasedName,
            );
          },
          [workers, addToast],
        );

        const advanceStage = useCallback(
          (oid) => {
            setOrders((p) =>
              p.map((o) => {
                if (o.id !== oid) return o;
                const ci = STAGES.findIndex((s) => s.id === o.currentStage);
                if (ci >= STAGES.length - 1) return o;
                const ns = STAGES[ci + 1];
                const w = workers[Math.floor(Math.random() * workers.length)];
                const ns2 = [...o.stages];
                ns2[ci] = { ...ns2[ci], status: 'completed', completedAt: new Date() };
                ns2.push({
                  ...ns,
                  status: 'in_progress',
                  startedAt: new Date(),
                  completedAt: null,
                });
                setActivity((a) => [
                  {
                    worker: w,
                    action: 'moved to ' + ns.label + ' for',
                    coffin: o,
                    time: new Date(),
                    type: ns.id === 'completed' ? 'success' : 'info',
                  },
                  ...a,
                ]);
                if (ns.id === 'completed')
                  setWorkers((ws) =>
                    ws.map((x) =>
                      x.id === w.id
                        ? {
                            ...x,
                            todayCount: x.todayCount + 1,
                            weekCount: x.weekCount + 1,
                            monthCount: x.monthCount + 1,
                            allTime: x.allTime + 1,
                          }
                        : x,
                    ),
                  );
                addToast(
                  ns.id === 'completed' ? 'success' : 'info',
                  ns.id === 'completed' ? 'Coffin Completed' : 'Stage Advanced',
                  ns.id === 'completed'
                    ? o.orderNumber + ' finished production'
                    : o.orderNumber + ' moved to ' + ns.label,
                );
                return { ...o, currentStage: ns.id, stages: ns2, assignedWorker: { ...w } };
              }),
            );
          },
          [workers, addToast],
        );

        const reassignOrder = useCallback(
          (oid) => {
            const w = workers[Math.floor(Math.random() * workers.length)];
            setOrders((p) => p.map((o) => (o.id === oid ? { ...o, assignedWorker: { ...w } } : o)));
            addToast('info', 'Reassigned', w.name + ' assigned to order');
          },
          [workers, addToast],
        );

        const removeOrder = useCallback(
          (oid) => {
            setOrders((p) => p.filter((o) => o.id !== oid));
            addToast('info', 'Removed', 'Order removed from queue');
          },
          [addToast],
        );

        const restockMat = useCallback(
          (mid) => {
            setMaterials((p) =>
              p.map((m) => (m.id === mid ? { ...m, quantity: m.quantity + m.minLevel * 2 } : m)),
            );
            addToast('success', 'Restocked', 'Material restocked successfully');
          },
          [addToast],
        );

        const addMaterial = useCallback(
          (mat) => {
            setMaterials((p) => [...p, { ...mat, id: Math.max(...p.map((m) => m.id), 0) + 1 }]);
            addToast('success', 'Added', mat.name + ' added to inventory');
          },
          [addToast],
        );

        // Real-time simulation
        useEffect(() => {
          const iv1 = setInterval(() => {
            setOrders((prev) => {
              const active = prev.filter((o) => o.currentStage !== 'completed');
              if (!active.length) return prev;
              const o = active[Math.floor(Math.random() * active.length)];
              const ci = STAGES.findIndex((s) => s.id === o.currentStage);
              if (ci >= STAGES.length - 1) return prev;
              const ns = STAGES[ci + 1];
              const w = WORKERS[Math.floor(Math.random() * WORKERS.length)];
              const ns2 = [...o.stages];
              ns2[ci] = { ...ns2[ci], status: 'completed', completedAt: new Date() };
              ns2.push({ ...ns, status: 'in_progress', startedAt: new Date(), completedAt: null });
              setActivity((a) => [
                {
                  worker: w,
                  action: 'moved to ' + ns.label + ' for',
                  coffin: o,
                  time: new Date(),
                  type: 'info',
                },
                ...a,
              ]);
              if (ns.id === 'completed') {
                setWorkers((ws) =>
                  ws.map((x) =>
                    x.id === w.id
                      ? {
                          ...x,
                          todayCount: x.todayCount + 1,
                          weekCount: x.weekCount + 1,
                          monthCount: x.monthCount + 1,
                          allTime: x.allTime + 1,
                        }
                      : x,
                  ),
                );
                addToast('success', 'Coffin Completed', o.orderNumber + ' finished production');
              } else {
                addToast(
                  'info',
                  'Stage Update',
                  w.name.split(' ')[0] + ' advanced ' + o.orderNumber + ' to ' + ns.label,
                );
              }
              return prev.map((x) =>
                x.id === o.id
                  ? { ...x, currentStage: ns.id, stages: ns2, assignedWorker: { ...w } }
                  : x,
              );
            });
          }, 12000);
          const iv2 = setInterval(() => {
            if (Math.random() < 0.3) {
              const w = WORKERS[Math.floor(Math.random() * WORKERS.length)];
              const tp = CTYPES[Math.floor(Math.random() * CTYPES.length)];
              const o = {
                id: gid(),
                orderNumber: 'CF-' + _id,
                customerName: CUSTOMERS[Math.floor(Math.random() * 12)],
                deceasedName: DECEASED[Math.floor(Math.random() * 12)],
                coffinType: tp,
                color: COLORS[Math.floor(Math.random() * 6)],
                interior: INTERIORS[Math.floor(Math.random() * 6)],
                currentStage: 'cutting',
                stages: [
                  { ...STAGES[0], status: 'in_progress', startedAt: new Date(), completedAt: null },
                ],
                assignedWorker: { ...w },
                priority: Math.random() < 0.1 ? 'urgent' : Math.random() < 0.25 ? 'high' : 'normal',
                price: PRICES[tp] || 20000,
                createdAt: new Date(),
                dueDate: new Date(Date.now() + (3 + Math.floor(Math.random() * 5)) * 86400000),
              };
              setOrders((p) => [o, ...p]);
              setActivity((a) => [
                {
                  worker: w,
                  action: 'started new order',
                  coffin: o,
                  time: new Date(),
                  type: 'success',
                },
                ...a,
              ]);
            }
          }, 28000);
          return () => {
            clearInterval(iv1);
            clearInterval(iv2);
          };
        }, [addToast]);

        const ctx = useMemo(
          () => ({
            orders,
            materials,
            workers,
            activity,
            toasts,
            addToast,
            openModal,
            closeModal,
            createOrder,
            advanceStage,
            reassignOrder,
            removeOrder,
            restockMat,
            addMaterial,
          }),
          [
            orders,
            materials,
            workers,
            activity,
            toasts,
            addToast,
            openModal,
            closeModal,
            createOrder,
            advanceStage,
            reassignOrder,
            removeOrder,
            restockMat,
            addMaterial,
          ],
        );

        const tabs = {
          dashboard: DashboardTab,
          production: ProductionTab,
          leaderboard: LeaderboardTab,
          insights: InsightsTab,
          analytics: AnalyticsTab,
          workers: WorkersTab,
          materials: MaterialsTab,
        };
        const Tab = tabs[tab] || DashboardTab;

        return (
          <Ctx.Provider value={ctx}>
            <div className="bg-atmos" />
            <Toasts />
            <Sidebar tab={tab} setTab={setTab} open={sbOpen} setOpen={setSbOpen} />
            <div className="main">
              <TopBar open={sbOpen} setOpen={setSbOpen} />
              <div className="page">
                <Tab />
              </div>
            </div>
            <ModalRouter type={modal.type} data={modal.data} close={closeModal} />
          </Ctx.Provider>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
