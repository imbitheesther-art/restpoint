# ============================================
# Rest Point — Frontend Nginx Config
# Production: restpoint.co.ke & app.restpoint.co.ke
# Port: 80 (inside container, mapped to 8082 externally)
# ============================================

server {
    listen 80;
    server_name restpoint.co.ke www.restpoint.co.ke app.restpoint.co.ke localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ============================================
    # Security Headers
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CORS Headers — Allow both production domains
    add_header Access-Control-Allow-Origin "https://restpoint.co.ke" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization, x-tenant-slug, x-tenant-id, x-request-timestamp" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age "86400" always;

    # ============================================
    # Gzip Compression
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml;

    # ============================================
    # Cache Static Assets (1 year)
    # ============================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # API Proxy — Forward to API Gateway with path rewrite
    # FIX: proxy_pass to restpoint_api_gateway:5000 instead of api-gateway:5000
    # FIX: rewrite ^/api/(.*)$ /api/v1/restpoint/$1 break for path compatibility
    # ============================================
    location /api/ {
        proxy_pass http://restpoint_api_gateway:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # CRITICAL FIX: Path rewrite - frontend calls /api/*, gateway expects /api/v1/restpoint/*
        rewrite ^/api/(.*)$ /api/v1/restpoint/$1 break;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://restpoint.co.ke";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization, x-tenant-slug, x-tenant-id, x-request-timestamp";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ============================================
    # Socket.IO Proxy — WebSocket Support
    # FIX: proxy_pass to restpoint_socketio_service:5000 instead of socketio-service:5013
    # ============================================
    location /socket.io/ {
        proxy_pass http://restpoint_socketio_service:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Long timeout for WebSocket
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # ============================================
    # SPA Fallback — All routes go to index.html
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # Health Check (used by Docker HEALTHCHECK)
    # ============================================
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # ============================================
    # Deny sensitive files
    # ============================================
    location ~ /\.env {
        deny all;
    }
    location ~ /node_modules {
        deny all;
    }
}