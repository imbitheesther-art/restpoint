version: '3.8'

services:
  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules
    networks:
      - mortuary-network
    restart: unless-stopped

  # Scanner Service (NEW - Go-based document scanner)
  scanner-service:
    build:
      context: .
      dockerfile: ./services/scanner-service/Dockerfile
    ports:
      - "2024:2024"
    environment:
      - SERVER_PORT=2024
      - SERVER_HOST=0.0.0.0
      - SERVER_ENV=development
      - STORAGE_TYPE=local
      - STORAGE_UPLOAD_PATH=./uploads/scanned
      - SCANNER_AUTO_DETECT=true
      - SCANNER_DEFAULT_DPI=300
      - SCANNER_DEFAULT_FORMAT=pdf
      - TZ=Africa/Nairobi
    volumes:
      - ./services/scanner-service/uploads:/app/uploads
      - ./services/scanner-service/config:/app/config
    networks:
      - mortuary-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2024/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Documents Service
  documents-service:
    build:
      context: .
      dockerfile: ./services/documents-service/Dockerfile
    ports:
      - "8112:8112"
    volumes:
      - ./services/documents-service/uploads:/app/uploads
      - ./services/documents-service/config:/app/config
    environment:
      - PORT=8112
      - NODE_ENV=development
    networks:
      - mortuary-network
    restart: unless-stopped
    depends_on:
      - api-gateway

  # Deceased Service
  deceased-service:
    build:
      context: .
      dockerfile: ./services/deceased-service/Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - ./services/deceased-service:/app
      - /app/node_modules
    environment:
      - PORT=5001
      - NODE_ENV=development
    networks:
      - mortuary-network
    restart: unless-stopped
    depends_on:
      - api-gateway

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    ports:
      - "5002:5002"
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules
    environment:
      - PORT=5002
      - NODE_ENV=development
      - JWT_SECRET=your-jwt-secret-key-here
    networks:
      - mortuary-network
    restart: unless-stopped
    depends_on:
      - api-gateway

  # Billing Service
  billing-service:
    build:
      context: .
      dockerfile: ./services/billing-service/Dockerfile
    ports:
      - "5003:5003"
    volumes:
      - ./services/billing-service:/app
      - /app/node_modules
    environment:
      - PORT=5003
      - NODE_ENV=development
    networks:
      - mortuary-network
    restart: unless-stopped
    depends_on:
      - api-gateway

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    ports:
      - "5004:5004"
    volumes:
      - ./services/notification-service:/app
      - /app/node_modules
    environment:
      - PORT=5004
      - NODE_ENV=development
    networks:
      - mortuary-network
    restart: unless-stopped
    depends_on:
      - api-gateway

  # Socket.io Service
  socketio-service:
    build:
      context: .
      dockerfile: ./services/socketio-service/Dockerfile
    ports:
      - "5005:5005"
    volumes:
      - ./services/socketio-service:/app
      - /app/node_modules
    environment:
      - PORT=5005
      - NODE_ENV=development
    networks:
      - mortuary-network
    restart: unless-stopped
    depends_on:
      - api-gateway

  # Frontend Client
  frontend:
    build:
      context: ./FrontendClient
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./FrontendClient:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:8000
    networks:
      - mortuary-network
    restart: unless-stopped
    depends_on:
      - api-gateway

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
      - frontend
      - scanner-service
    networks:
      - mortuary-network
    restart: unless-stopped

networks:
  mortuary-network:
    driver: bridge

volumes:
  uploads:
  scanned:
  database: