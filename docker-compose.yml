version: '3.8'

services:
  # ============================================================================
  # INFRASTRUCTURE SERVICES
  # ============================================================================

  # MariaDB Database
  mariadb:
    image: mariadb:10.11
    container_name: restpoint_mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: RestPoint2024!
      MARIADB_DATABASE: restpoint_main
      MARIADB_USER: restpoint_user
      MARIADB_PASSWORD: RestPointUser2024
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - restpoint_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: restpoint_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      restpoint_network:
        aliases:
          - restpoint_redis
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: restpoint_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: restpoint
      RABBITMQ_DEFAULT_PASS: RestPointRabbit2024
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - restpoint_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5

  # ============================================================================
  # CORE SERVICES
  # ============================================================================

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    container_name: restpoint_api_gateway
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - TRUST_PROXY=true
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=restpoint_user
      - DB_PASSWORD=RestPointUser2024
      - REDIS_HOST=restpoint_redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - JWT_SECRET=RestPointJWTSecret2024ChangeMe!SuperSecureInProduction
      - REFRESH_TOKEN_SECRET=RestPointRefreshTokenSecret2024!ChangeMe
    env_file:
      - .env
    networks:
      - restpoint_network
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Auth Service
  auth-service:
