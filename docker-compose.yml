services:
  # ============================================
  # RESTPOINT GATEWAY
  # ============================================
  restpoint-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: restpoint_gateway
    ports:
      - "${API_GATEWAY_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - SERVICE_NAME=restpoint-gateway
      - PORT=5000
    networks:
      - restpoint_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # AUTH SERVICE
  # ============================================
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: restpoint_auth
    ports:
      - "${AUTH_SERVICE_PORT:-5001}:5001"
    env_file:
      - .env
    networks:
      - restpoint_net
    restart: unless-stopped

  # ============================================
  # TENANT SERVICE
  # ============================================
  tenant-service:
    build:
      context: .
      dockerfile: services/tenant-service/Dockerfile
    container_name: restpoint_tenant
    ports:
      - "${TENANT_SERVICE_PORT:-5002}:5002"
    env_file:
      - .env
    networks:
      - restpoint_net
    restart: unless-stopped

  # ============================================
  # DECEASED SERVICE
