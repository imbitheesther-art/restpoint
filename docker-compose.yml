  # ============================================================================
  # FRONTEND & LOGGING
  # ============================================================================

  # Loki - Centralized Logging
  loki:
    image: grafana/loki:3.0.0
    container_name: restpoint_loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - restpoint_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Promtail - Log Collector
  promtail:
    image: grafana/promtail:3.0.0
    container_name: restpoint_promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - restpoint_network
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: restpoint_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - restpoint_network
    depends_on:
      - loki
    restart: unless-stopped

  # Frontend Client
  frontend:
    build:
      context: ./FrontendClient
      dockerfile: Dockerfile
    container_name: restpoint_frontend
    ports:
      - "8080:80"
    depends_on:
      - api-gateway
    networks:
      - restpoint_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  restpoint_network:
    driver: bridge
    name: restpoint_network

volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  scanner_uploads:
    driver: local
  scanner_config:
    driver: local
  auth_service_data:
    driver: local
  tenant_service_data:
    driver: local
  deceased_service_data:
    driver: local
  billing_service_data:
    driver: local
  notification_service_data:
    driver: local
  support_service_data:
    driver: local
  documents_service_data:
    driver: local
  socketio_service_data:
    driver: local
  workshop_service_data:
    driver: local
  hearse_service_data:
    driver: local
  loki_data:
    driver: local
