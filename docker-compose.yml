services:
  # ============================================================================
  # INFRASTRUCTURE SERVICES
  # ============================================================================

  # MariaDB Database
  mariadb:
    image: mariadb:10.11
    container_name: restpoint_mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: restpoint_main
      MARIADB_USER: restpoint_user
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - restpoint_network
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: restpoint_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      restpoint_network:
        aliases:
          - restpoint_redis
          - redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 15s
      timeout: 10s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: restpoint_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-restpoint}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - restpoint_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5

  # ============================================================================
  # CORE SERVICES
  # ============================================================================

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    container_name: restpoint_api_gateway
    ports:
      - "5000:5000"
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - SERVICE_NAME=api-gateway
      - SERVICE_VERSION=1.0.1
      - CONSUL_HOST=http://restpoint_consul:8500
      - TRUST_PROXY=true
      - DB_HOST=restpoint_mariadb
      - DB_PORT=3306
      - DB_USER=restpoint_user
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=restpoint_redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=restpoint_rabbitmq
      - RABBITMQ_PORT=5672
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - AUTH_SERVICE_URL=http://restpoint_auth_service:5000
      - USERS_SERVICE_URL=http://restpoint_auth_service:5000
      - TENANT_SERVICE_URL=http://restpoint_tenant_service:5000
      - DECEASED_SERVICE_URL=http://restpoint_deceased_service:5000
      - MARKETPLACE_SERVICE_URL=http://restpoint_marketplace_service:5000
      - MPESA_SERVICE_URL=http://restpoint_mpesa_service:5000
      - PORTAL_SERVICE_URL=http://restpoint_portal_service:5000
      - INVOICES_SERVICE_URL=http://restpoint_invoice_service:5000
      - COFFIN_SERVICE_URL=http://restpoint_coffin_service:5000
      - NOTIFICATION_SERVICE_URL=http://restpoint_notification_service:5000
      - DOCUMENTS_SERVICE_URL=http://restpoint_documents_service:5000
      - ANALYTICS_SERVICE_URL=http://restpoint_analytics_service:5000
      - BODYCHECKOUT_SERVICE_URL=http://restpoint_bodycheckout_service:5000
      - EDOCUMENTS_SERVICE_URL=http://restpoint_edocuments_service:5000
      - CALENDAR_SERVICE_URL=http://restpoint_calender_service:5000
      - CHEMICAL_SERVICE_URL=http://restpoint_chemical_service:5000
      - BILLING_SERVICE_URL=http://restpoint_billing_service:5000
      - SOCKETIO_SERVICE_URL=http://restpoint_socketio_service:5000
      - EXTRA_SERVICES_URL=http://restpoint_extra_services:5000
      - CALL_SERVICE_URL=http://restpoint_call_service:5000
      - QRCODE_SERVICE_URL=http://restpoint_qrcode_service:5000
    env_file:
      - .env
    networks:
      - restpoint_network
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

