  # ============================================
  # VISITORS SERVICE
  # ============================================
  visitors-service:
    build:
      context: .
      dockerfile: services/visitors-service/Dockerfile
    container_name: restpoint_visitors
    ports:
      - "${VISITORS_SERVICE_PORT:-5014}:5014"
    env_file:
      - .env
    networks:
      - restpoint_net
    restart: unless-stopped

  # ============================================
  # BODYCHECKOUT SERVICE
  # ============================================
  bodycheckout-service:
    build:
      context: .
      dockerfile: services/bodycheckout-service/Dockerfile
    container_name: restpoint_bodycheckout
    ports:
      - "${BODYCHECKOUT_SERVICE_PORT:-5015}:5015"
    env_file:
      - .env
    networks:
      - restpoint_net
    restart: unless-stopped

  # ============================================
  # EXTRA SERVICES
  # ============================================
  extra-services:
    build:
      context: .
      dockerfile: services/extra-services/Dockerfile
    container_name: restpoint_extra
    ports:
      - "${EXTRA_SERVICES_PORT:-5016}:5016"
    env_file:
      - .env
    networks:
      - restpoint_net
    restart: unless-stopped

  # ============================================
  # CALL SERVICE
  # ============================================
  call-service:
    build:
      context: .
      dockerfile: services/call-service/Dockerfile
    container_name: restpoint_call
    ports:
      - "${CALL_SERVICE_PORT:-5018}:5018"
    env_file:
      - .env
    networks:
      - restpoint_net
    restart: unless-stopped

  # ============================================
  # PORTAL SERVICE
  # ============================================
  portal-service:
    build:
      context: .
      dockerfile: services/portal-service/Dockerfile
    container_name: restpoint_portal
    ports:
      - "${PORTAL_SERVICE_PORT:-5019}:5019"
    env_file:
      - .env
    networks:
      - restpoint_net
    restart: unless-stopped

  # ============================================
  # BILLING SERVICE - TypeScript Primary (Port 5020)
  # ============================================
  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    container_name: restpoint_billing
    ports:
      - "${BILLING_SERVICE_PORT:-5020}:5020"
    env_file:
      - .env
    environment:
      - PYTHON_FALLBACK_URL=http://billing-service-python:5021
      - GO_FALLBACK_URL=http://billing-service-go:5022
    networks:
      - restpoint_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5020/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # BILLING SERVICE - Python Fallback (Port 5021)
  # ============================================
  billing-service-python:
    build:
      context: services/billing-service
      dockerfile: Dockerfile.python
    container_name: restpoint_billing_python
    ports:
      - "${BILLING_SERVICE_PYTHON_PORT:-5021}:5021"
    env_file:
      - .env
    networks:
      - restpoint_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5021/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # CHEMICAL SERVICE (Port 5105)
  # ============================================
  chemical-service:
    build:
      context: .
      dockerfile: services/chemical-service/Dockerfile
    container_name: restpoint_chemical
    ports:
      - "${CHEMICAL_SERVICE_PORT:-5105}:5105"
    env_file:
      - .env
    networks:
      - restpoint_net
    restart: unless-stopped

  # ============================================
  # FRONTEND - React UI (Port 8082)
  # ============================================
  frontend:
    build:
      context: ./FrontendClient/client
      dockerfile: Dockerfile
    container_name: restpoint_frontend
    ports:
      - "8082:80"
    env_file:
      - .env
    depends_on:
      - restpoint-gateway
    networks:
      - restpoint_net
    restart: unless-stopped

networks:
  restpoint_net:
    driver: bridge