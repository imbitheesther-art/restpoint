# ============================================================
# RestPoint — Host Nginx Config
# File: /etc/nginx/sites-available/restpoint
#
# ARCHITECTURE:
#   HTTPS/WSS → host nginx → API gateway (port 5000)  [all /api/ traffic]
#                          → socketio  (port 5018)     [all /socket.io/ traffic]
#                          → frontend  (port 8080)     [everything else = SPA]
#
# The API gateway at port 5000 handles ALL routing to microservices.
# Do NOT proxy individual services here — that is the gateway's job.
# ============================================================

# WebSocket connection header map
# Sends 'upgrade' for WS requests, 'close' for regular HTTP
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ============================================================
# HTTP → HTTPS redirect
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name restpoint.co.ke www.restpoint.co.ke app.restpoint.co.ke portal.restpoint.co.ke;

    # Allow certbot renewal challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# MAIN SITE — restpoint.co.ke / www / app
# ============================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name restpoint.co.ke www.restpoint.co.ke app.restpoint.co.ke;

    ssl_certificate     /etc/letsencrypt/live/restpoint.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/restpoint.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 100M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # Logging
    access_log /var/log/nginx/restpoint_access.log;
    error_log  /var/log/nginx/restpoint_error.log;

    # ============================================================
    # Socket.IO — MUST come before /api/ and / blocks
    # Routes WebSocket AND long-polling to the socketio container
    # ============================================================
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5018/socket.io/;

        proxy_http_version 1.1;
        proxy_buffering off;

        # Critical: map variable ensures HTTP polling works, not just WS
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Long timeouts — WebSocket connections are persistent
        proxy_connect_timeout 7d;
        proxy_send_timeout    7d;
        proxy_read_timeout    7d;
    }

    # ============================================================
    # API Gateway — handles ALL /api/ routing to microservices
    # Gateway at port 5000 already knows every service route.
    # ============================================================
    location /api/ {
        proxy_pass http://127.0.0.1:5000;

        proxy_http_version 1.1;
        proxy_buffering         off;
        proxy_request_buffering off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # 15-minute timeout for slow operations (org setup, PDF generation etc.)
        proxy_connect_timeout 900s;
        proxy_send_timeout    900s;
        proxy_read_timeout    900s;
    }

    # ============================================================
    # Frontend React SPA — catches everything else
    # ============================================================
    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Nginx health check
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# ============================================================
# PORTAL SUBDOMAIN — portal.restpoint.co.ke
# ============================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name portal.restpoint.co.ke;

    ssl_certificate     /etc/letsencrypt/live/restpoint.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/restpoint.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 100M;

    access_log /var/log/nginx/restpoint_portal_access.log;
    error_log  /var/log/nginx/restpoint_portal_error.log;

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5018/socket.io/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 7d;
        proxy_send_timeout    7d;
        proxy_read_timeout    7d;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 900s;
        proxy_send_timeout    900s;
        proxy_read_timeout    900s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
