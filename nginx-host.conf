# ============================================================
# RestPoint - Host-Level Nginx Configuration
# Place this file on the VPS at:
#   /etc/nginx/sites-available/restpoint
# Then: ln -s /etc/nginx/sites-available/restpoint /etc/nginx/sites-enabled/
#
# This config runs on the HOST (not inside Docker).
# It handles:
#   - SSL termination (HTTPS → HTTP to Docker)
#   - WebSocket upgrade (WSS → WS to Docker)
#   - Redirect HTTP → HTTPS
#
# SSL certificates managed by Certbot (Let's Encrypt):
#   certbot --nginx -d restpoint.co.ke -d app.restpoint.co.ke -d portal.restpoint.co.ke
# ============================================================

# ============================================================
# Map: determine correct WebSocket Connection header
# Prevents "Connection: close" being sent for non-upgrade requests
# ============================================================
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ============================================================
# Redirect all HTTP → HTTPS
# ============================================================
server {
    listen 80;
    server_name restpoint.co.ke app.restpoint.co.ke portal.restpoint.co.ke;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# MAIN SITE — restpoint.co.ke / app.restpoint.co.ke
# ============================================================
server {
    listen 443 ssl http2;
    server_name restpoint.co.ke app.restpoint.co.ke;

    # --- SSL Certificates (set by Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/restpoint.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/restpoint.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 100M;

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # ============================================================
    # Socket.IO — MUST come before /api/ and / blocks
    # Handles both WebSocket (WSS) and long-polling fallback
    # ============================================================
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5018/socket.io/;

        proxy_http_version 1.1;
        proxy_buffering off;

        # WebSocket upgrade headers — CRITICAL for WSS to work
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Long timeouts — WebSocket connections are persistent
        proxy_connect_timeout 7d;
        proxy_send_timeout    7d;
        proxy_read_timeout    7d;
    }

    # ============================================================
    # API Gateway — all /api/* requests
    # ============================================================
    location /api/ {
        proxy_pass http://127.0.0.1:5000;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ============================================================
    # Frontend React SPA — Docker container on port 8080
    # ============================================================
    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ============================================================
    # Health check
    # ============================================================
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# ============================================================
# PORTAL SUBDOMAIN — portal.restpoint.co.ke
# ============================================================
server {
    listen 443 ssl http2;
    server_name portal.restpoint.co.ke;

    ssl_certificate     /etc/letsencrypt/live/restpoint.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/restpoint.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 100M;

    # Socket.IO for portal
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5018/socket.io/;

        proxy_http_version 1.1;
        proxy_buffering off;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 7d;
        proxy_send_timeout    7d;
        proxy_read_timeout    7d;
    }

    # API Gateway for portal
    location /api/ {
        proxy_pass http://127.0.0.1:5000;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Portal Frontend SPA
    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
