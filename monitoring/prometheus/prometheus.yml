global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'restpoint-monitor'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'localhost:9093'

# Load alerting rules
rule_files:
  - '/etc/prometheus/alerts/*.yml'

# Scrape configurations
scrape_configs:
  # ============================================
  # PROMETHEUS SELF-MONITORING
  # ============================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ============================================
  # NODE EXPORTER - Server Metrics
  # ============================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          service: 'node-exporter'
          component: 'server'

  # ============================================
  # CADVISOR - Container Metrics
  # ============================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          component: 'containers'

  # ============================================
  # BLACKBOX EXPORTER - External Service Monitoring
  # ============================================
  - job_name: 'blackbox'
    static_configs:
      - targets:
          - 'blackbox-exporter:9115'
    metrics_path: /probe
    params:
      module: [http_2xx]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ============================================
  # APPLICATION METRICS - API Gateway
  # ============================================
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:5000']
        labels:
          service: 'api-gateway'
          component: 'application'
    metrics_path: '/metrics'

  # ============================================
  # APPLICATION METRICS - Deceased Service
  # ============================================
  - job_name: 'deceased-service'
    static_configs:
      - targets: ['host.docker.internal:5001']
        labels:
          service: 'deceased-service'
          component: 'application'
    metrics_path: '/metrics'

  # ============================================
  # APPLICATION METRICS - Auth Service
  # ============================================
  - job_name: 'auth-service'
    static_configs:
      - targets: ['host.docker.internal:5002']
        labels:
          service: 'auth-service'
          component: 'application'
    metrics_path: '/metrics'

  # ============================================
  # DATABASE METRICS - MySQL
  # ============================================
  - job_name: 'mysql'
    static_configs:
      - targets: ['host.docker.internal:3306']
        labels:
          service: 'mysql'
          component: 'database'
    metrics_path: '/metrics'

  # ============================================
  # CACHE METRICS - Redis
  # ============================================
  - job_name: 'redis'
    static_configs:
      - targets: ['host.docker.internal:6379']
        labels:
          service: 'redis'
          component: 'cache'
    metrics_path: '/metrics'

  # ============================================
  # FRONTEND METRICS
  # ============================================
  - job_name: 'frontend'
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: 'frontend'
          component: 'application'
    metrics_path: '/metrics'

  # ============================================
  # NGINX METRICS
  # ============================================
  - job_name: 'nginx'
    static_configs:
      - targets: ['host.docker.internal:80']
        labels:
          service: 'nginx'
          component: 'proxy'
    metrics_path: '/metrics'

  # ============================================
  # BLACKBOX HTTP CHECKS - External Endpoints
  # ============================================
  - job_name: 'blackbox-http-checks'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - 'http://localhost:80'
          - 'http://localhost:5000/health'
          - 'http://localhost:5001/health'
          - 'http://localhost:5002/health'
          - 'http://localhost:3000'
        labels:
          service: 'blackbox-checks'
          component: 'external'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115