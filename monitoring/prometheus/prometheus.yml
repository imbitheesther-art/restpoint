  # ============================================
  # BLACKBOX HTTP CHECKS - External Endpoints
  # ============================================
  - job_name: 'blackbox-http-checks'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - 'http://84.247.183.53:80'
          - 'http://84.247.183.53:5000/health'
          - 'http://84.247.183.53:5001/health'
          - 'http://84.247.183.53:5002/health'
          - 'http://84.247.183.53:5003/health'
          - 'http://84.247.183.53:8080'
        labels:
          service: 'blackbox-checks'
          component: 'external'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115