services:
  # ============================================
  # K6 - Load Testing Tool
  # ============================================
  k6:
    image: grafana/k6:latest
    container_name: restpoint-k6
    restart: always
    ports:
      - "6565:6565"
    volumes:
      - ./scripts:/scripts
      - ./results:/results
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6
    networks:
      - monitoring
    command: run /scripts/load-test.js --out json=/results/results.json
    depends_on:
      - influxdb

  # ============================================
  # INFLUXDB - Time-series database for k6 results
  # ============================================
  influxdb:
    image: influxdb:2.7
    container_name: restpoint-influxdb
    restart: always
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin123
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - monitoring

  # ============================================
  # GRAFANA - For k6 results visualization
  # ============================================
  k6-grafana:
    image: grafana/grafana:latest
    container_name: restpoint-k6-grafana
    restart: always
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - k6-grafana-data:/var/lib/grafana
      - ./grafana-k6-provisioning:/etc/grafana/provisioning
    networks:
      - monitoring
    depends_on:
      - influxdb

volumes:
  influxdb-data:
    driver: local
  k6-grafana-data:
    driver: local

networks:
  monitoring:
    external: true
