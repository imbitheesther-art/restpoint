apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: true
    jsonData:
      version: InfluxQL
      organization: k6
      defaultBucket: k6
      tlsSkipVerify: true
    user: admin
    secureJsonData:
      password: admin123