services:
  # ============================================
  # PROMETHEUS - Metrics Collection & Storage
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: restpoint-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts:/etc/prometheus/alerts
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ============================================
  # GRAFANA - Dashboards & Visualization
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: restpoint-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - monitoring
    depends_on:
      - prometheus

  # ============================================
  # NODE EXPORTER - Server Hardware Metrics
  # ============================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: restpoint-node-exporter
    restart: always
    pid: host
    network_mode: host
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host/root'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.cpu'
      - '--collector.diskstats'
      - '--collector.filesystem'
      - '--collector.loadavg'
      - '--collector.meminfo'
      - '--collector.netdev'
      - '--collector.netstat'
      - '--collector.processes'
      - '--collector.tcpstat'
      - '--collector.udp'
      - '--collector.systemd'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/root:ro

  # ============================================
  # CADVISOR - Container Metrics
  # ============================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: restpoint-cadvisor
    restart: always
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - monitoring

  # ============================================
  # MYSQL EXPORTER - Database Metrics
  # Uses host IP directly to connect to MariaDB
  # ============================================
  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: restpoint-mysql-exporter
    restart: always
    ports:
      - "9104:9104"
    environment:
      - DATA_SOURCE_NAME=exporter:exporter_password@(84.247.183.53:3306)/
    networks:
      - monitoring

  # ============================================
  # REDIS EXPORTER - Cache Metrics
  # Uses host IP directly to connect to Redis
  # ============================================
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: restpoint-redis-exporter
    restart: always
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=84.247.183.53:6379
      - REDIS_PASSWORD=
    networks:
      - monitoring

  # ============================================
  # RABBITMQ EXPORTER - Message Queue Metrics
  # Uses host IP directly to connect to RabbitMQ
  # ============================================
  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:latest
    container_name: restpoint-rabbitmq-exporter
    restart: always
    ports:
      - "9419:9419"
    environment:
      - RABBIT_URL=http://84.247.183.53:15672
      - RABBIT_USER=guest
      - RABBIT_PASSWORD=guest
      - PUBLISH_PORT=9419
    networks:
      - monitoring

  # ============================================
  # PROCESS EXPORTER - Process-level metrics
  # ============================================
  process-exporter:
    image: ncabatoff/process-exporter:latest
    container_name: restpoint-process-exporter
    restart: always
    ports:
      - "9256:9256"
    volumes:
      - ./process-exporter/config.yml:/config/config.yml
      - /proc:/host/proc:ro
    command:
      - '--config.path=/config/config.yml'
      - '--procfs=/host/proc'
    networks:
      - monitoring

  # ============================================
  # BLACKBOX EXPORTER - External Service Monitoring
  # ============================================
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: restpoint-blackbox-exporter
    restart: always
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox-exporter/blackbox.yml:/config/blackbox.yml
    command:
      - '--config.file=/config/blackbox.yml'
    networks:
      - monitoring

  # ============================================
  # UPTIME KUMA - Service Availability & Alerts
  # ============================================
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: restpoint-uptime-kuma
    restart: always
    ports:
      - "3002:3001"
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - monitoring

  # ============================================
  # LOKI - Log Aggregation
  # ============================================
  loki:
    image: grafana/loki:latest
    container_name: restpoint-loki
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - monitoring

  # ============================================
  # PROMTAIL - Log Collection
  # ============================================
  promtail:
    image: grafana/promtail:latest
    container_name: restpoint-promtail
    restart: always
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command:
      - '-config.file=/etc/promtail/config.yml'
    networks:
      - monitoring

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  uptime-kuma-data:
    driver: local
  loki-data:
    driver: local

networks:
  monitoring:
    driver: bridge
