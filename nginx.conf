# ============================================
# Rest Point — Nginx Production Configuration
# Modern Kenyan Mortuary Management Platform
# ============================================

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ============================================
    # Basic Settings
    # ============================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 100M;

    # ============================================
    # MIME Types
    # ============================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ============================================
    # SSL Settings
    # ============================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ============================================
    # Logging
    # ============================================
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # ============================================
    # Gzip Compression
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ============================================
    # Security Headers (global defaults)
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ============================================
    # Resolver for dynamic upstreams
    # ============================================
    resolver 127.0.0.11 valid=30s;  # Docker DNS
    resolver_timeout 5s;

    # ============================================
    # Rate Limiting Zones
    # ============================================
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============================================
    # Real IP from Cloudflare
    # ============================================
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    real_ip_header CF-Connecting-IP;

    # ============================================
    # Upstream Services
    # ============================================
    upstream api_gateway {
        server 127.0.0.1:5000;
        keepalive 64;
    }

    upstream frontend_app {
        server 127.0.0.1:8082;
        keepalive 32;
    }

    # ============================================
    # Main Site — restpoint.co.ke & app.restpoint.co.ke
    # Proxies to frontend container on 8082 and API gateway on 5000
    # ============================================
    server {
        listen 443 ssl http2;
        server_name restpoint.co.ke www.restpoint.co.ke app.restpoint.co.ke;

        # SSL — primary cert for restpoint.co.ke (SAN covers app.restpoint.co.ke)
        ssl_certificate /etc/letsencrypt/live/restpoint.co.ke/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/restpoint.co.ke/privkey.pem;

        # ============================================
        # Content Security Policy (per-server override)
        # ============================================
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.restpoint.co.ke wss://api.restpoint.co.ke; frame-src 'self';" always;

        # ============================================
        # API Gateway Proxy
        # ============================================
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # ============================================
        # WebSocket Support (SocketIO)
        # ============================================
        location /socket.io/ {
            proxy_pass http://127.0.0.1:5013;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # ============================================
        # Frontend — Proxy to frontend container on 8082
        # ============================================
        location / {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ============================================
        # Uploads
        # ============================================
        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ============================================
        # Deny sensitive files
        # ============================================
        location ~ /\. {
            deny all;
        }
        location ~ /\.env {
            deny all;
        }
        location ~ /node_modules {
            deny all;
        }
    }

    # ============================================
    # API Subdomain — api.restpoint.co.ke
    # Direct proxy to API gateway (no frontend)
    # ============================================
    server {
        listen 443 ssl http2;
        server_name api.restpoint.co.ke;

        ssl_certificate /etc/letsencrypt/live/api.restpoint.co.ke/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.restpoint.co.ke/privkey.pem;

        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }
    }

    # ============================================
    # Portal Subdomain — portal.restpoint.co.ke
    # ============================================
    server {
        listen 443 ssl http2;
        server_name portal.restpoint.co.ke;

        ssl_certificate /etc/letsencrypt/live/portal.restpoint.co.ke/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/portal.restpoint.co.ke/privkey.pem;

        location / {
            proxy_pass http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ============================================
    # HTTP → HTTPS Redirect (all domains)
    # ============================================
    server {
        listen 80;
        server_name restpoint.co.ke www.restpoint.co.ke app.restpoint.co.ke api.restpoint.co.ke portal.restpoint.co.ke;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================
    # Default catch-all server (reject unknown hosts)
    # ============================================
    server {
        listen 80 default_server;
        listen 443 ssl default_server;

        server_name _;

        # Self-signed cert for default server
        ssl_certificate /etc/nginx/ssl/default.crt;
        ssl_certificate_key /etc/nginx/ssl/default.key;

        return 444;
    }
}