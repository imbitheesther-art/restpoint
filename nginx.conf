# RestPoint Frontend Nginx Configuration
# Serves React SPA and proxies API requests to gateway
# Supports subdomain routing: portal.restpoint.co.ke → Portal Login only
# NOTE: SSL termination is handled at the host/reverse proxy level (e.g., Cloudflare, HAProxy, or host nginx)
# This config is for the Docker container internal nginx (HTTP only on port 80)

events {
    worker_connections 1024;
}

http {
    # ============================================
    # Proxy Upstreams - Using container names with restpoint_ prefix
    # ============================================
    upstream api_gateway {
        server restpoint_api_gateway:5000;
    }

    upstream socketio_backend {
        server restpoint_socketio_service:5000;
    }

    # ============================================
    # MAIN SITE - restpoint.co.ke / app.restpoint.co.ke
    # ============================================
    server {
    listen 80;
    server_name restpoint.co.ke app.restpoint.co.ke _;

    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;
    gzip_min_length 1000;
    gzip_proxied any;

    # Root for React app
    root /usr/share/nginx/html;
    index index.html index.htm;

    # ============================================
    # API Gateway Proxy - Match all API paths with path rewrite
    # Handles both:
    #   - Frontend calls /api/v1/restpoint/*  → proxy as-is
    #   - Frontend calls /api/*               → rewrite to /api/v1/restpoint/*
    # ============================================
    location /api/ {
        proxy_pass http://api_gateway;
        
        # Rewrite /api/* to /api/v1/restpoint/* (only if /v1/restpoint not already present)
        rewrite ^/api/(?!v1/restpoint/)(.*)$ /api/v1/restpoint/$1 break;

        # Required proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Disable buffering for real-time responses
        proxy_buffering off;
        proxy_request_buffering off;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ============================================
    # Socket.IO Proxy - Direct to socketio service
    # ============================================
    location /socket.io/ {
        proxy_pass http://socketio_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_buffering off;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # ============================================
    # Static Assets - Long Cache
    # ============================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ============================================
    # SPA Fallback - All routes to index.html
    # Exclude API and socket.io paths
    # ============================================
    location / {
        # Try file first, then directory, finally index.html for SPA routing
        try_files $uri $uri/ /index.html;
        
        # Don't cache index.html
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ============================================
    # Security Headers
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================
    # Health Check Endpoint
    # ============================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # Deny Access
    # ============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

    # ============================================
    # PORTAL SUBDOMAIN - portal.restpoint.co.ke
    # Serves ONLY the Portal Login page
    # ============================================
server {
    listen 80;
    server_name portal.restpoint.co.ke;

    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;
    gzip_min_length 1000;
    gzip_proxied any;

    # Root for React app
    root /usr/share/nginx/html;
    index index.html index.htm;

    # ============================================
    # API Gateway Proxy (Portal routes only) with path rewrite
    # ============================================
    location /api/ {
        proxy_pass http://api_gateway;
        
        # Rewrite /api/* to /api/v1/restpoint/* (only if /v1/restpoint not already present)
        rewrite ^/api/(?!v1/restpoint/)(.*)$ /api/v1/restpoint/$1 break;

        # Required proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Disable buffering
        proxy_buffering off;
        proxy_request_buffering off;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ============================================
    # Socket.IO Proxy
    # ============================================
    location /socket.io {
        proxy_pass http://socketio_backend/socket.io;
        proxy_http_version 1.1;
        proxy_buffering off;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # ============================================
    # Static Assets
    # ============================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ============================================
    # Portal SPA - All routes serve index.html
    # The React app will show Portal Login by default
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
        
        # Don't cache index.html
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ============================================
    # Security Headers
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================
    # Health Check
    # ============================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # Deny Access
    # ============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
}